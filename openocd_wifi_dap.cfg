# EHUB OpenOCD 配置 — 无线 DAP (CMSIS-DAP over TCP via ESP32)
# 通过 WiFi 连接 EHUB 内置 DAP → ESP32 → TCP:6000
#
# 使用方法:
#   openocd -f openocd_wifi_dap.cfg
#
# 前提:
#   1. EHUB 已上电，ESP32 WiFi 已连接
#   2. ehub.local 可解析 (或使用 IP 地址)

# -------------------------------------------------------
# 接口: CMSIS-DAP over TCP
# -------------------------------------------------------
adapter driver cmsis-dap

# 使用 TCP 后端连接 ESP32
cmsis-dap backend tcp

# EHUB ESP32 的地址和端口
# 如果 mDNS 不可用，请替换为 ESP32 的 IP 地址
cmsis-dap port 6000

# 使用 SWD 协议
transport select swd

# -------------------------------------------------------
# 目标: STM32F4x (示例，根据实际目标芯片修改)
# -------------------------------------------------------
source [find target/stm32f4x.cfg]

# 降低 SWD 时钟以适应无线延迟 (可根据稳定性调整)
adapter speed 1000

# 软件复位
reset_config none
cortex_m reset_config sysresetreq
