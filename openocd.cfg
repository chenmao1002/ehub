# EHUB OpenOCD 配置
# 调试器: CMSIS-DAP (EHUB 内置的 DAP 接口)
# 目标芯片: STM32F407VETx

# -------------------------------------------------------
# 接口: CMSIS-DAP (HID) - 外部下载器 VID=0xC251 PID=0xF001
# -------------------------------------------------------
source [find interface/cmsis-dap.cfg]

# 指定外部 DAP 下载器，避免连接到 EHUB 自身的 HID 接口
cmsis-dap vid_pid 0xC251 0xF001
# 强制使用 HID 后端 (CMSIS-DAP v1)，因设备使用标准 Windows HID 驱动
cmsis-dap backend hid

# 使用 SWD 协议 (比 JTAG 速度更快)
transport select swd

# -------------------------------------------------------
# 目标: STM32F4x
# -------------------------------------------------------
source [find target/stm32f4x.cfg]

# SWD 时钟频率 (Hz)
adapter speed 2000

# 没有连接 NRST 引脚，使用 Cortex-M SYSRESETREQ 软件复位
reset_config none
cortex_m reset_config sysresetreq

# 注意: init/reset halt 由 Cortex-Debug 或烧录命令自动处理，不在此处添加
