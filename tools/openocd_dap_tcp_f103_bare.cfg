# Minimal wireless DAP test config (avoid stm32f1x examine-end memory writes)
# Use with custom OpenOCD build

adapter driver cmsis-dap
cmsis-dap backend tcp
cmsis-dap tcp host ehub.local
cmsis-dap tcp port 6000

transport select swd
adapter speed 100

reset_config none

source [find target/stm32f1x.cfg]

cortex_m reset_config sysresetreq

# Re-apply conservative SWD speed after target script defaults.
adapter speed 100

# Override target script hooks that perform extra memory writes during examine.
# Goal: isolate SWD/DP link stability first.
$_TARGETNAME configure -event examine-end {}
$_TARGETNAME configure -event reset-init {}
